<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Simple Sidebar - Start Bootstrap Template</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <link href="css/styles.css" rel="stylesheet" />
        <style>
            /* Thêm một chút style cho card phòng mà không ảnh hưởng cấu trúc template */
            .room-card { border: 1px solid #dee2e6; border-radius: 8px; margin-bottom: 20px; padding: 15px; background: #fff; }
        </style>
    </head>
    <body>
        <div class="d-flex" id="wrapper">
            <div class="border-end bg-white" id="sidebar-wrapper">
                <div class="sidebar-heading border-bottom bg-light">Start Bootstrap</div>
           <div class="list-group list-group-flush">
    <a id="menu-rooms" class="list-group-item list-group-item-action list-group-item-light p-3" href="#!">🏠 Danh sách phòng</a>
    <a id="menu-tenants" class="list-group-item list-group-item-action list-group-item-light p-3" href="#!">👤 Người thuê</a>
    <a id="menu-contracts" class="list-group-item list-group-item-action list-group-item-light p-3" href="#!">📝 Hợp đồng</a>
   <a id="menu-services" class="list-group-item list-group-item-action list-group-item-light p-3" href="#!">💰 Dịch vụ</a>
</div>
            </div>
            <div id="page-content-wrapper">
                <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
                    <div class="container-fluid">
                        <button class="btn btn-primary" id="sidebarToggle">Toggle Menu</button>
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                        <div class="collapse navbar-collapse" id="navbarSupportedContent">
                            <ul class="navbar-nav ms-auto mt-2 mt-lg-0">
                                <li class="nav-item active"><a class="nav-link" href="#!">Home</a></li>
                                <li class="nav-item"><a class="nav-link" href="#!">Link</a></li>
                                <li class="nav-item dropdown">
                                    <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">Dropdown</a>
                                    <div class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                                        <a class="dropdown-item" href="#!">Action</a>
                                        <a class="dropdown-item" href="#!">Another action</a>
                                        <div class="dropdown-divider"></div>
                                        <a class="dropdown-item" href="#!">Something else here</a>
                                    </div>
                                </li>
                            </ul>
                        </div>
                    </div>
                </nav>
                <div class="container-fluid">
                    <h2 class="mt-4">Quản Lý Phòng Trọ</h2>
                    <div class="row mt-4" id="room-container">
                        <p class="text-center">Đang kết nối API...</p>
                    </div>
                </div>
            </div>
        </div>
       <div class="modal fade" id="roomModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Thông tin chi tiết phòng</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body" id="modal-content">
                        </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    
<script src="js/room.js"></script>
<script src="js/tenant.js"></script>
<script src="js/contract.js"></script>
<script src="js/services.js"></script>
    <script src="js/sidebar.js"></script>
        <div class="modal fade" id="roomModal" tabindex="-1">
  
    </body>
</html>
